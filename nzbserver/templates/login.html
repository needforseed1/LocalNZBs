<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ provider }} — Login</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center;
           background: #14151a; color: #e6e7eb;
           font: 14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    .box { background: #1d1f26; border: 1px solid #2c2f3a; border-radius: 10px;
           padding: 2rem; width: 320px; }
    h1 { margin: 0 0 1rem; font-size: 1.25rem; }
    label { display: block; margin-bottom: 0.4rem; color: #8b8f9c; }
    input { width: 100%; font: inherit; background: #14151a; color: #e6e7eb;
            border: 1px solid #2c2f3a; border-radius: 6px; padding: 0.5rem 0.6rem; }
    button { width: 100%; margin-top: 1rem; font: inherit; cursor: pointer;
             background: #5b8cff; color: #fff; border: 0; border-radius: 6px; padding: 0.6rem; }
    .error { color: #e5484d; margin-top: 0.75rem; }
  </style>
</head>
<body>
  <form class="box" method="post" action="/ui/login">
    <h1>{{ provider }}</h1>
    <label for="password">Password</label>
    <input id="password" name="password" type="password" autofocus autocomplete="current-password">
    <button type="submit">Sign in</button>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
  </form>
</body>
</html>
